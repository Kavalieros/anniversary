# Deploy to GitHub Pages
# secrets.js is generated from repository secrets at deploy time.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate secrets.js from GitHub Secrets
        env:
          EMAIL_1: ${{ secrets.EMAIL_1 }}
          EMAIL_2: ${{ secrets.EMAIL_2 }}
        run: |
          node -e "
            const fs = require('fs');
            const body = \`window.ANNIVERSARY_SECRETS = {
              allowedEmails: [
                \${JSON.stringify(process.env.EMAIL_1)},
                \${JSON.stringify(process.env.EMAIL_2)},
              ],
              passphrases: [
                'ηλιοτρόπιο',
                'ηλιοτρόπια',
                'ηλίανθος',
                'ηλίανθοι',
              ],
            };\`;
            fs.writeFileSync('secrets.js', body);
          "

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
