<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Δύο Χρόνια Εμείς</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-card">
      <div class="gate-icon">♥</div>
      <h1>Μόνο για εμάς</h1>
      <p class="gate-sub">Βάλε το email σου και τον κωδικό για να ξεκλειδώσεις τη σελίδα.</p>
      <form id="gate-form" autocomplete="off" novalidate>
        <label for="gate-email">Το email σου</label>
        <input type="email" id="gate-email" inputmode="email" autocapitalize="off" placeholder="email@example.com" required />
        <label for="gate-pass">Κωδικός</label>
        <input type="password" id="gate-pass" autocapitalize="off" autocomplete="off" required />
        <p id="gate-error" class="gate-error" hidden></p>
        <button type="submit">Ξεκλείδωμα</button>
      </form>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <div class="hearts-bg" aria-hidden="true"></div>

    <header class="hero">
      <p class="hero-eyebrow">Γιορτάζουμε</p>
      <h1 class="hero-title"><span id="years-count">2</span> Χρόνια</h1>
      <p class="hero-names"><span id="your-name">Εγώ</span> &amp; <span id="her-name">Φυλλιώ</span></p>
      <p class="hero-since">Μαζί από <span id="start-date-display"></span></p>
    </header>

    <section class="counter-section">
      <div class="counter-grid">
        <div class="counter-item">
          <span class="counter-value" id="days-together">—</span>
          <span class="counter-label">μέρες μαζί</span>
        </div>
        <div class="counter-item">
          <span class="counter-value" id="hours-together">—</span>
          <span class="counter-label">ώρες αγάπης</span>
        </div>
        <div class="counter-item">
          <span class="counter-value" id="heartbeats">—</span>
          <span class="counter-label">χτυποκαρδιές (περίπου)</span>
        </div>
      </div>
    </section>

    <section class="letter-section">
      <h2>Μία Επιστολή Για Σένα</h2>
      <div class="letter-paper">
        <p id="love-letter" class="love-letter"></p>
        <p class="letter-sign">— <span id="letter-sign-name"></span></p>
      </div>
    </section>

    <section class="timeline-section">
      <h2>Η Ιστορία Μας</h2>
      <div id="timeline" class="timeline"></div>
    </section>

    <section class="gallery-section" id="gallery-section" hidden>
      <h2>Αναμνήσεις</h2>
      <div id="gallery" class="gallery"></div>
    </section>

    <footer class="footer">
      <p>Φτιαγμένο με αγάπη · <span id="footer-year"></span></p>
      <button id="logout-btn" class="logout-btn" type="button">Κλείδωμα σελίδας</button>
    </footer>
  </div>

  <script src="content.js"></script>
  <script src="secrets.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
